spring:
  application:
    name: chatchat
    version: 1.0.0-SNAPSHOT
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: "jdbc:mysql://192.168.195.221:3306/live_runtime_api?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: livebos
    password: apexSoft123!
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: false
  web:
    resources:
      static-locations: classpath:/static/
  mvc:
    static-path-pattern: /**
    throw-exception-if-no-handler-found: true
  resources:
    add-mappings: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 32MB

server:
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  shutdown: graceful
  tomcat:
    max-http-form-post-size: 33554432
    max-swallow-size: -1

chatchat:
  internal-credential:
    enabled: true
    username: chatchat_mcp_internal
    encrypted-secret:
    secret: chatchat_internal_default_secret
    crypto-key:
    crypto-key-file:
  mcp:
    capabilities:
      news:
        enabled: true
        tools:
          web_search: { enabled: true, agent-callable: true, timeout: 30s }
    center:
      enabled: true
      base-url: http://localhost:8090
      admin-username: chatchat_mcp_internal
      encrypted-admin-password:
      admin-password: chatchat_internal_default_secret
      encrypted-invocation-token:
      invocation-token: chatchat_internal_default_secret
      timeout-ms: 0
      import-standalone-server: true
    stdio-proxy:
      enabled: true
      command-allow-list:
        - npx
        - node
        - uvx
        - python
        - python3
  models:
    defaultProvider: openai
    defaultChatModel: deepseek-v4-pro
    availableChatModels:
      - deepseek-v4-pro
    openai:
      apiKey: sk-7f5c64a84f774201829be1dc7193d09a
      baseUrl: https://api.deepseek.com
      timeout: 300000
      maxTokens: -1
      maxRetries: 3
  search:
    engine: opensearch
    store-path: ./data/search-rocksdb
    file-path: ./data/search-files
    rebuild-on-startup: false
    opensearch:
      enabled: true
      url: https://192.168.195.221:9200
      username: admin
      password: apexSoft12345
      index-name: chatchat_documents_dev
      insecure-ssl: true
      connect-timeout-ms: 5000
      request-timeout-ms: 30000
      bulk-batch-size: 200
      max-query-terms: 20
      max-query-chars: 500
      max-permission-roles: 64
      log-query-dsl: true
      embedding:
        request-timeout-ms: 300000
        enabled: true
        endpoint: https://llm-7upawl16up8649rh.cn-beijing.maas.aliyuncs.com/compatible-mode/v1/embeddings
        api-key: sk-720436c855ac470bb955388d0e8c9b89
        model: qwen3.7-text-embedding
        dimension: 1024
        vector-field: contentVector
        max-input-chars: 6000
        vector-candidate-limit: 50
  tools:
    document-search:
      api-base-url: http://localhost:8080
      auth:
        username: chatchat_mcp_internal
        password: chatchat_internal_default_secret

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    enabled: false

logging:
  charset:
    console: UTF-8
    file: UTF-8
  file:
    name: logs/chatchat.log
  level:
    com.chatchat: DEBUG
    org.springframework.web: INFO
    org.springframework.security: DEBUG
    org.hibernate: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
