spring:
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: "${CHATCHAT_API_MYSQL_URL:jdbc:mysql://localhost:3306/chatchat_api?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}"
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${CHATCHAT_API_MYSQL_USERNAME:chatchat}
    password: ${CHATCHAT_API_MYSQL_ENCRYPTED_PASSWORD:${CHATCHAT_API_MYSQL_PASSWORD:}}
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect
