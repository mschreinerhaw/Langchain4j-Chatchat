spring:
  application:
    name: chatchat
    version: 1.0.0-SNAPSHOT
  jpa:
    hibernate:
      ddl-auto: ${CHAT_JPA_DDL_AUTO:update}
    show-sql: false
    database-platform: ${CHAT_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
    properties:
      hibernate:
        format_sql: true
        connection:
          driver_class: ${CHAT_DATASOURCE_DRIVER:org.h2.Driver}
          url: ${CHAT_DATASOURCE_URL:jdbc:h2:file:./data/h2/chatchat;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1}
          username: ${CHAT_DATASOURCE_USERNAME:sa}
          pool_size: ${CHAT_HIKARI_MAXIMUM_POOL_SIZE:5}
          autocommit: ${CHAT_HIKARI_AUTO_COMMIT:true}
          isolation: ${CHAT_HIBERNATE_CONNECTION_ISOLATION:2}
  datasource:
    url: ${CHAT_DATASOURCE_URL:jdbc:h2:file:./data/h2/chatchat;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1}
    driver-class-name: ${CHAT_DATASOURCE_DRIVER:org.h2.Driver}
    username: ${CHAT_DATASOURCE_USERNAME:sa}
    password: ${CHAT_DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      auto-commit: ${CHAT_HIKARI_AUTO_COMMIT:true}
      transaction-isolation: ${CHAT_HIKARI_TRANSACTION_ISOLATION:TRANSACTION_READ_COMMITTED}
  h2:
    console:
      enabled: false
      path: /h2-console
  web:
    resources:
      static-locations: classpath:/static/
  mvc:
    static-path-pattern: /**
    throw-exception-if-no-handler-found: true
  resources:
    add-mappings: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8080
  servlet:
    context-path: /
  shutdown: graceful
  tomcat:
    threads:
      max: 200
      min-spare: 10
    max-connections: 500
    max-http-post-size: 10485760
  error:
    include-stacktrace: on-param
    include-message: always

chatchat:
  mcp:
    center:
      enabled: ${CHAT_MCP_CENTER_ENABLED:true}
      base-url: ${CHAT_MCP_CENTER_BASE_URL:http://localhost:8090}
      admin-username: ${CHAT_MCP_CENTER_ADMIN_USERNAME:admin}
      admin-password: ${CHAT_MCP_CENTER_ADMIN_PASSWORD:admin123}
      admin-login-path: ${CHAT_MCP_CENTER_ADMIN_LOGIN_PATH:/api/v1/admin/auth/login}
      service-list-path: ${CHAT_MCP_CENTER_SERVICE_LIST_PATH:/api/v1/mcp-services}
      mcp-endpoint: ${CHAT_MCP_CENTER_MCP_ENDPOINT:/mcp}
      standalone-service-id: ${CHAT_MCP_CENTER_STANDALONE_SERVICE_ID:chatchat-mcp-server}
      standalone-service-name: ${CHAT_MCP_CENTER_STANDALONE_SERVICE_NAME:ChatChat MCP Server}
      invocation-token: ${CHAT_MCP_CENTER_INVOCATION_TOKEN:}
      timeout-ms: ${CHAT_MCP_CENTER_TIMEOUT_MS:20000}
      import-standalone-server: ${CHAT_MCP_CENTER_IMPORT_STANDALONE:true}
    stdio-proxy:
      enabled: true
      max-sessions: 32
      request-timeout-ms: 20000
      startup-timeout-ms: 15000
      idle-ttl-ms: 300000
      cleanup-interval-ms: 30000
      command-allow-list:
        - npx
        - node
        - uvx
        - python
        - python3
  models:
    defaultProvider: openai
    defaultChatModel: qwen3.6-plus
    defaultEmbeddingModel: text-embedding-v4
    availableChatModels:
      - qwen3.6-plus
      - deepseek-v4-pro
      - qwen3.5-35b-a3b
      - qwen3.6-35b-a3b
      - qwen-flash-character
      - qwen3.6-max-preview
      - text-embedding-v4
#    timeout: 300
    openai:
#      apiKey: ${OPENAI_API_KEY:sk-7e959e47577547839a0da923f15098a4}
      apiKey: ${OPENAI_API_KEY:sk-720436c855ac470bb955388d0e8c9b89}
      baseUrl: https://dashscope.aliyuncs.com/compatible-mode/v1
#      baseUrl: https://api.deepseek.com/v1
      timeout: 300
      maxRetries: 3
      proxy:
        enabled: ${OPENAI_PROXY_ENABLED:false}
        host: ${OPENAI_PROXY_HOST:}
        port: ${OPENAI_PROXY_PORT:0}
        type: ${OPENAI_PROXY_TYPE:http}
    ollama:
      baseUrl: http://localhost:11434
      timeout: 30
    xinference:
      baseUrl: http://localhost:9997
      timeout: 30
  rag:
    maxRetrievalResults: 10
    defaultChunkSize: 1000
    defaultChunkOverlap: 100
    timeout: 60
  agent:
    task:
      queue-capacity: ${CHAT_AGENT_TASK_QUEUE_CAPACITY:1000}
      core-pool-size: ${CHAT_AGENT_TASK_CORE_POOL_SIZE:4}
      max-pool-size: ${CHAT_AGENT_TASK_MAX_POOL_SIZE:16}
      keep-alive-seconds: ${CHAT_AGENT_TASK_KEEP_ALIVE_SECONDS:60}
      list-limit: ${CHAT_AGENT_TASK_LIST_LIMIT:50}
      event-store:
        type: ${CHAT_AGENT_EVENT_STORE_TYPE:rocksdb}
        path: ${CHAT_AGENT_EVENT_STORE_PATH:./data/agent-event-rocksdb}
        create-if-missing: true
  search:
    store-path: ${CHAT_SEARCH_STORE_PATH:./data/search-rocksdb}
    file-path: ${CHAT_SEARCH_FILE_PATH:./data/search-files}
    create-if-missing: true
    embedding-enabled: ${CHAT_SEARCH_EMBEDDING_ENABLED:true}
    max-upload-bytes: ${CHAT_SEARCH_MAX_UPLOAD_BYTES:5242880}
    default-limit: 20
    max-limit: 100
    summary-length: 180
  chat:
    defaultTimeout: 30
    streamingTimeout: 300
    maxMessageLength: 4096
    conversationHistorySize: 20
    detail-store:
      type: rocksdb
      path: ${CHAT_DETAIL_STORE_PATH:./data/chat-rocksdb}
      create-if-missing: true

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    display-request-duration: true
    try-it-out-enabled: true
  show-actuator: false
  use-fqn: false

logging:
  level:
    com.chatchat: DEBUG
    org.springframework.web: INFO
    org.springframework.security: DEBUG
    org.hibernate: WARN
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/chatchat.log
    max-size: 10MB
    max-history: 30

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

