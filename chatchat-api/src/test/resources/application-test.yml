spring:
  datasource:
    url: jdbc:h2:mem:chatchat_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true

logging:
  level:
    com.chatchat: INFO
    org.hibernate: WARN
    org.hibernate.SQL: WARN

chatchat:
  agent:
    learning:
      model-attribution-enabled: false
    task:
      scheduler-scan-ms: 3600000
      event-store:
        type: memory
  search:
    store-path: ./target/test-search-rocksdb-${random.uuid}
    file-path: ./target/test-search-files-${random.uuid}
    lucene-index-path: ./target/test-search-lucene-${random.uuid}
  chat:
    detail-store:
      type: memory
