<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 · LiveMCP License Center</title>
  <link rel="stylesheet" href="/login.css">
</head>
<body>
  <main class="login-page">
    <div class="glow glow-left"></div>
    <div class="glow glow-right"></div>

    <section class="login-card" aria-labelledby="loginTitle">
      <div class="brand">
        <span class="brand-mark">M</span>
        <div>
          <strong>LiveMCP</strong>
          <small>License Center</small>
        </div>
      </div>

      <div class="heading">
        <span class="internal-badge"><i></i> 企业内部系统</span>
        <h1 id="loginTitle">欢迎登录</h1>
        <p>登录授权管理中心，为客户安全签发产品 License。</p>
      </div>

      <div id="loginMessage" class="message" role="alert" hidden></div>

      <form action="/login" method="post" autocomplete="on">
        <label for="username">账号</label>
        <div class="field">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 21a8 8 0 0 0-16 0M12 13a5 5 0 1 0 0-10 5 5 0 0 0 0 10Z"/>
          </svg>
          <input id="username" name="username" type="text" placeholder="请输入管理员账号"
                 autocomplete="username" autofocus required>
        </div>

        <label for="password">密码</label>
        <div class="field">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="4" y="10" width="16" height="11" rx="2"/>
            <path d="M8 10V7a4 4 0 0 1 8 0v3"/>
          </svg>
          <input id="password" name="password" type="password" placeholder="请输入登录密码"
                 autocomplete="current-password" required>
          <button id="passwordToggle" class="password-toggle" type="button" aria-label="显示密码">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"/>
              <circle cx="12" cy="12" r="2.5"/>
            </svg>
          </button>
        </div>

        <button class="submit-button" type="submit">
          <span>登录授权中心</span>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </form>

      <div class="security-tip">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 3 5 6v5c0 4.6 2.9 8.5 7 10 4.1-1.5 7-5.4 7-10V6l-7-3Z"/>
          <path d="m9.5 12 1.7 1.7 3.6-3.8"/>
        </svg>
        <span>访问行为受安全审计，请勿向他人透露登录凭据</span>
      </div>
    </section>

    <footer>© 2026 LiveMCP · 企业授权管理平台</footer>
  </main>
  <script src="/login.js"></script>
</body>
</html>
