spring:
  application:
    name: chatchat-mcp-server
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: "jdbc:mysql://localhost:3306/chatchat_mcp?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: chatchat
    password:
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: false

server:
  port: 8090
  servlet:
    context-path: /
  shutdown: graceful

chatchat:
  internal-credential:
    enabled: true
    username: chatchat_mcp_internal
    encrypted-secret:
    secret: chatchat_internal_default_secret
    crypto-key:
    crypto-key-file:
  mcp:
    admin:
      username: admin
      password: admin123
      encrypted-password:
      token-ttl-minutes: 480
    security:
      require-mcp-token: true
      encrypted-invocation-token:
      invocation-token: chatchat_internal_default_secret
    authorization:
      enabled: false
      api-base-url: http://localhost:8080
      auth:
        username: chatchat_mcp_internal
        encrypted-password:
        password: chatchat_internal_default_secret
        bearer-token:
    command-templates:
      seed-defaults-enabled: true
    sql-templates:
      seed-defaults-enabled: true
    lucene:
      enabled: true
      engine: opensearch
      index-dir: ./data/lucene/mcp
      open-search:
        enabled: true
        url: https://localhost:9200
        username: admin
        password:
        index-prefix: chatchat_mcp_dev_
        insecure-ssl: true
        request-timeout-ms: 30000
        debug-search: true
        search-concurrency:
          enabled: true
          request-timeout-ms: 8000
          retry-429-attempts: 1
          retry-backoff-min-ms: 100
          retry-backoff-max-ms: 300
          lexical:
            max-running: 12
            queue-capacity: 30
            queue-timeout-ms: 1500
          vector:
            max-running: 4
            queue-capacity: 10
            queue-timeout-ms: 500
        embedding:
          request-timeout-ms: 300000
          enabled: false
          endpoint: https://llm-7upawl16up8649rh.cn-beijing.maas.aliyuncs.com/compatible-mode/v1/embeddings
          api-key: sk-720436c855ac470bb955388d0e8c9b89
          model: text-embedding-v4
          dimension: 1024
          vector-field: mcpContentVector
          max-input-chars: 6000
          vector-candidate-limit: 50
    server:
      endpoint: /mcp
      document-search:
        api-base-url: http://localhost:8080
        auth:
          username: chatchat_mcp_internal
          encrypted-password:
          password: chatchat_internal_default_secret
          bearer-token:
  tools:
    document-search:
      enabled: true
      api-base-url: http://localhost:8080
      auth:
        username: chatchat_mcp_internal
        encrypted-password:
        password: chatchat_internal_default_secret
        bearer-token:
    web-search:
      enabled: true
      provider: bing_html
      endpoint: https://cn.bing.com/search
      timeout-ms: 0
      browser:
        browsers-path: playwright-browsers
        skip-browser-download: false
    web-crawler:
      browser:
        browsers-path: playwright-browsers
        skip-browser-download: false

logging:
  file:
    name: ./logs/chatchat-mcp-server.log
  level:
    root: INFO
    com.chatchat: INFO
    io.modelcontextprotocol: INFO
    org.springframework.boot.autoconfigure: WARN
    org.hibernate: WARN
