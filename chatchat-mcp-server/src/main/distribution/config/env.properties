# Environment template for bin/start.sh and bin/start.bat.
# Put machine-specific secrets in config/env.local; it is intentionally ignored by git.
# Leave SPRING_PROFILES_ACTIVE unset to use spring.profiles.default from config/application.yml.
# SPRING_PROFILES_ACTIVE=dev

# Internal API <-> MCP service account.
# Generate CHATCHAT_INTERNAL_ENCRYPTED_SECRET with:
#   java -cp <app.jar> com.chatchat.common.security.InternalSecretTool encrypt <secret> <cryptoKey>
CHATCHAT_INTERNAL_USERNAME=chatchat_mcp_internal
CHATCHAT_INTERNAL_ENCRYPTED_SECRET=
CHATCHAT_INTERNAL_SECRET=chatchat_internal_default_secret
CHATCHAT_INTERNAL_CRYPTO_KEY=
CHATCHAT_INTERNAL_CRYPTO_KEY_FILE=

# MCP admin account for human/admin-console login.
CHATCHAT_MCP_ADMIN_USERNAME=admin
CHATCHAT_MCP_ADMIN_PASSWORD=
CHATCHAT_MCP_ADMIN_ENCRYPTED_PASSWORD=
CHATCHAT_MCP_ADMIN_TOKEN_TTL_MINUTES=480

# Runtime database/search mode is controlled by application-*.yml.
# Copy one of the application-*.template presets to the active application file when switching modes.
# Set CHATCHAT_DATASOURCE_MIGRATION_ENABLED=true once to copy H2 data into an empty MySQL schema.
CHATCHAT_DATASOURCE_MIGRATION_ENABLED=false

# MySQL/OpenSearch passwords can be encrypted with the same ENC(...) format.
# URL and username stay readable for easier troubleshooting.
# Keep CHATCHAT_INTERNAL_CRYPTO_KEY_FILE outside this env file when possible.
CHATCHAT_MCP_MYSQL_ENCRYPTED_PASSWORD=
CHATCHAT_MCP_MYSQL_URL=
CHATCHAT_MCP_MYSQL_USERNAME=
CHATCHAT_MCP_MYSQL_PASSWORD=
CHATCHAT_OPENSEARCH_ENCRYPTED_PASSWORD=
CHATCHAT_OPENSEARCH_URL=
CHATCHAT_OPENSEARCH_USERNAME=
CHATCHAT_OPENSEARCH_PASSWORD=
# Set true when OpenSearch uses a self-signed certificate or an IP address not listed in the certificate SAN.
# Set false when OpenSearch uses a trusted certificate and hostname.
CHATCHAT_OPENSEARCH_INSECURE_SSL=true
CHATCHAT_EMBEDDING_ENCRYPTED_API_KEY=
CHATCHAT_EMBEDDING_API_KEY=
CHATCHAT_EMBEDDING_REQUEST_TIMEOUT_MS=300000
CHATCHAT_MCP_SEARCH_CONCURRENCY_ENABLED=true
CHATCHAT_MCP_SEARCH_REQUEST_TIMEOUT_MS=8000
CHATCHAT_MCP_SEARCH_RETRY_429_ATTEMPTS=1
CHATCHAT_MCP_SEARCH_LEXICAL_MAX_RUNNING=12
CHATCHAT_MCP_SEARCH_VECTOR_MAX_RUNNING=4

# Runtime/API base URL and optional pre-issued bearer token.
CHATCHAT_API_BASE_URL=http://localhost:8080
CHATCHAT_API_AUTH_BEARER_TOKEN=

# Playwright browser cache used by web_search browser rendering.
# Point to the parent directory when it contains OS subdirectories:
#   playwright-browsers/windows
#   playwright-browsers/linux
# Or point directly to a single OS cache directory.
PLAYWRIGHT_BROWSERS_PATH=playwright-browsers
CHAT_WEB_SEARCH_BROWSER_SKIP_DOWNLOAD=false
# Set while building offline images/packages that must never download browsers.
# web_search also sets this automatically when the selected cache already has Chromium.
# PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1

# Optional LiveData integration
CHAT_MCP_LIVEDATA_ENABLED=false
CHAT_MCP_LIVEDATA_JDBC_URL=
CHAT_MCP_LIVEDATA_USERNAME=
CHAT_MCP_LIVEDATA_PASSWORD=
CHAT_MCP_LIVEDATA_DRIVER_CLASS=com.mysql.cj.jdbc.Driver
CHAT_MCP_LIVEDATA_SERVICE_BASE_URL=
CHAT_MCP_LIVEDATA_LOGIN_ID=
CHAT_MCP_LIVEDATA_LOGIN_PASSWORD=
CHAT_MCP_LIVEDATA_AMS_TOKEN=
