spring:
  application:
    name: chatchat-mcp-server
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: "jdbc:mysql://192.168.195.221:3306/live_runtime_mcp?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: livebos
    password: apexSoft123!
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: false

server:
  port: 8090
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  shutdown: graceful

chatchat:
  internal-credential:
    enabled: true
    username: chatchat_mcp_internal
    encrypted-secret:
    secret: chatchat_internal_default_secret
    crypto-key:
    crypto-key-file:
  mcp:
    news-runtime:
      base-url: ${CHATCHAT_NEWS_RUNTIME_URL:http://localhost:8091}
      timeout-millis: 30000
    capabilities:
      news:
        enabled: true
        tools:
          web_search: { enabled: true, agent-callable: true, timeout: 30s }
          news_search: { enabled: true, agent-callable: true, timeout: 30s }
          news_latest: { enabled: true, agent-callable: true, timeout: 20s }
          news_source_status: { enabled: true, agent-callable: false, timeout: 10s }
    admin:
      username: admin
      password: admin123
      encrypted-password:
      token-ttl-minutes: 480
    security:
      require-mcp-token: true
      encrypted-invocation-token:
      invocation-token: chatchat_internal_default_secret
    authorization:
      enabled: false
      api-base-url: http://localhost:8080
      auth:
        username: chatchat_mcp_internal
        encrypted-password:
        password: chatchat_internal_default_secret
        bearer-token:
    command-templates:
      seed-defaults-enabled: true
    sql-templates:
      seed-defaults-enabled: true
    lucene:
      enabled: true
      engine: opensearch
      index-dir: ./data/lucene/mcp
      open-search:
        enabled: true
        url: https://192.168.195.221:9200
        username: admin
        password: apexSoft12345
        index-prefix: chatchat_mcp_dev_
        insecure-ssl: true
        request-timeout-ms: 30000
        debug-search: true
        search-concurrency:
          enabled: true
          request-timeout-ms: 8000
          retry-429-attempts: 1
          retry-backoff-min-ms: 100
          retry-backoff-max-ms: 300
          lexical:
            max-running: 12
            queue-capacity: 30
            queue-timeout-ms: 1500
          vector:
            max-running: 4
            queue-capacity: 10
            queue-timeout-ms: 500
        embedding:
          request-timeout-ms: 300000
          enabled: true
          endpoint: https://llm-7upawl16up8649rh.cn-beijing.maas.aliyuncs.com/compatible-mode/v1/embeddings
          api-key: sk-720436c855ac470bb955388d0e8c9b89
          model: text-embedding-v4
          dimension: 1024
          vector-field: mcpContentVector
          max-input-chars: 6000
          vector-candidate-limit: 50
    server:
      endpoint: /mcp
      document-search:
        api-base-url: http://localhost:8080
        auth:
          username: chatchat_mcp_internal
          encrypted-password:
          password: chatchat_internal_default_secret
          bearer-token:
  tools:
    document-search:
      enabled: true
      api-base-url: http://localhost:8080
      auth:
        username: chatchat_mcp_internal
        encrypted-password:
        password: chatchat_internal_default_secret
        bearer-token:
    livedata:
      # Runtime values are maintained on the admin page. Database access is bound through a database asset.
      enabled: true    

logging:
  charset:
    console: UTF-8
    file: UTF-8
  file:
    name: ./logs/chatchat-mcp-server.log
  level:
    root: INFO
    com.chatchat: INFO
    io.modelcontextprotocol: INFO
    org.springframework.boot.autoconfigure: WARN
    org.hibernate: WARN
