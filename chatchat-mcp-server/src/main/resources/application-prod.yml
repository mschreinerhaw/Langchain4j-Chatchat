spring:
  application:
    name: chatchat-mcp-server
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: "jdbc:h2:file:./data/h2/chatchat-mcp-server;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1"
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

server:
  port: ${CHATCHAT_MCP_PORT:8090}
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  shutdown: graceful

chatchat:
  internal-credential:
    enabled: true
    username: ${CHATCHAT_INTERNAL_USERNAME:chatchat_mcp_internal}
    encrypted-secret: ${CHATCHAT_INTERNAL_ENCRYPTED_SECRET:}
    secret: ${CHATCHAT_INTERNAL_SECRET:chatchat_internal_default_secret}
    crypto-key: ${CHATCHAT_INTERNAL_CRYPTO_KEY:}
    crypto-key-file: ${CHATCHAT_INTERNAL_CRYPTO_KEY_FILE:}
  license:
    fail-startup-on-invalid: ${CHATCHAT_LICENSE_FAIL_STARTUP_ON_INVALID:false}
    status-check-interval-ms: ${CHATCHAT_LICENSE_STATUS_CHECK_INTERVAL_MS:60000}
    license-file: ${CHATCHAT_LICENSE_FILE:./data/license/license.dat}
    server-id-file: ${CHATCHAT_LICENSE_SERVER_ID_FILE:./data/license/server.id}
    public-key-path: ${CHATCHAT_LICENSE_PUBLIC_KEY_PATH:./data/license/license-public.pem}
  mcp:
    market:
      retention:
        enabled: ${CHATCHAT_MARKET_RETENTION_ENABLED:true}
        hot-days: ${CHATCHAT_MARKET_HOT_DAYS:7}
        weekly-archive-days: ${CHATCHAT_MARKET_WEEKLY_ARCHIVE_DAYS:1825}
        cron: "${CHATCHAT_MARKET_RETENTION_CRON:0 30 2 * * SUN}"
        zone-id: ${CHATCHAT_MARKET_RETENTION_ZONE:Asia/Shanghai}
    news-runtime:
      base-url: ${CHATCHAT_NEWS_RUNTIME_URL:http://localhost:8091}
      timeout-millis: ${CHATCHAT_NEWS_RUNTIME_TIMEOUT_MILLIS:30000}
    capabilities:
      news:
        enabled: ${CHATCHAT_NEWS_CAPABILITY_ENABLED:true}
        tools:
          web_search: { enabled: true, agent-callable: true, timeout: 30s }
    admin:
      username: ${CHATCHAT_MCP_ADMIN_USERNAME:admin}
      password: ${CHATCHAT_MCP_ADMIN_PASSWORD:}
      encrypted-password: ${CHATCHAT_MCP_ADMIN_ENCRYPTED_PASSWORD:}
      token-ttl-minutes: ${CHATCHAT_MCP_ADMIN_TOKEN_TTL_MINUTES:480}
    security:
      require-mcp-token: true
      encrypted-invocation-token: ${CHATCHAT_INTERNAL_ENCRYPTED_SECRET:}
      invocation-token: ${CHATCHAT_INTERNAL_SECRET:chatchat_internal_default_secret}
    authorization:
      enabled: ${CHATCHAT_MCP_AUTHORIZATION_ENABLED:true}
      fail-open: ${CHATCHAT_MCP_AUTHORIZATION_FAIL_OPEN:false}
      require-tenant-context: ${CHATCHAT_MCP_AUTHORIZATION_REQUIRE_TENANT_CONTEXT:true}
      api-base-url: ${CHATCHAT_API_BASE_URL:http://localhost:8080}
      auth:
        username: ${CHATCHAT_INTERNAL_USERNAME:chatchat_mcp_internal}
        encrypted-password: ${CHATCHAT_INTERNAL_ENCRYPTED_SECRET:}
        password: ${CHATCHAT_INTERNAL_SECRET:chatchat_internal_default_secret}
        bearer-token: ${CHATCHAT_API_AUTH_BEARER_TOKEN:}
    command-templates:
      seed-defaults-enabled: false
    sql-templates:
      seed-defaults-enabled: true
    lucene:
      enabled: true
      engine: lucene
      index-dir: ./data/lucene/mcp
    server:
      endpoint: /mcp
      document-search:
        api-base-url: ${CHATCHAT_API_BASE_URL:http://localhost:8080}
        auth:
          username: ${CHATCHAT_INTERNAL_USERNAME:chatchat_mcp_internal}
          encrypted-password: ${CHATCHAT_INTERNAL_ENCRYPTED_SECRET:}
          password: ${CHATCHAT_INTERNAL_SECRET:chatchat_internal_default_secret}
          bearer-token: ${CHATCHAT_API_AUTH_BEARER_TOKEN:}
  tools:
    document-search:
      enabled: true
      api-base-url: ${CHATCHAT_API_BASE_URL:http://localhost:8080}
      auth:
        username: ${CHATCHAT_INTERNAL_USERNAME:chatchat_mcp_internal}
        encrypted-password: ${CHATCHAT_INTERNAL_ENCRYPTED_SECRET:}
        password: ${CHATCHAT_INTERNAL_SECRET:chatchat_internal_default_secret}
        bearer-token: ${CHATCHAT_API_AUTH_BEARER_TOKEN:}
logging:
  charset:
    console: UTF-8
    file: UTF-8
  file:
    name: ./logs/chatchat-mcp-server.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 14
      total-size-cap: 2GB
      clean-history-on-start: true
  level:
    root: INFO
    com.chatchat: INFO
    io.modelcontextprotocol: INFO
    org.springframework.boot.autoconfigure: WARN
    org.hibernate: WARN
