spring:
  application:
    name: chatchat-mcp-server
  datasource:
    url: jdbc:h2:file:./data/h2/chatchat-mcp-server;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: chatchat_mcp_h2_pwd
    hikari:
      pool-name: ChatChatMcpHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      auto-commit: true
      transaction-isolation: TRANSACTION_READ_COMMITTED
  h2:
    console:
      enabled: false
      path: /h2-console
      settings:
        web-allow-others: false
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        connection:
          driver_class: org.h2.Driver
          url: jdbc:h2:file:./data/h2/chatchat-mcp-server;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
          username: sa
          pool_size: 10
          autocommit: true
          isolation: 2

server:
  port: 8090
  servlet:
    context-path: /
  shutdown: graceful

chatchat:
  mcp:
    admin:
      username: admin
      password: admin123
      token-ttl-minutes: 480
    security:
      require-mcp-token: false
    cache:
      enabled: true
      path: ./data/mcp-cache-rocksdb
      create-if-missing: true
      cleanup-interval-ms: 60000
      cleanup-batch-size: 500
    server:
      name: chatchat-langchain4j-mcp-server
      version: 1.0.0-SNAPSHOT
      endpoint: /mcp
      expose-agent-compatible-only: true
      excluded-tool-names: []
      instructions: "ChatChat standalone MCP server exposing LangChain4j-compatible tools."
    livedata:
      # Enables the admin page to list and manually register LiveData APIs. Startup auto-sync is disabled.
      enabled: true
      jdbc-url: jdbc:mysql://192.168.195.223:3306/LiveDOP?characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
      username: root
      password: liveData#12345
      driver-class: com.mysql.cj.jdbc.Driver
      table-name: ld_dataservice_api
      service-base-url: http://192.168.195.223:5006
      service-path-template: /service/{serviceName}/call
      login-enabled: true
      login-path: /login
      login-id: console
      login-pwd: 123456
      login-timeout-ms: 10000
      session-ttl-seconds: 1800
      ams-token: aaabfc8b3eebfdfdb9faf418c285048a
      default-namespace: livedata
      tool-name-prefix: livedata_
      published-state: 0
      max-apis: 1000
      timeout-ms: 20000
      cache-enabled: false
      cache-ttl-seconds: 300
      overwrite-existing: false
      include-unpublished-as-disabled: false
      expose-ams-token-parameter: false
  tools:
    calculator:
      risk-level: ${CHAT_CALCULATOR_RISK_LEVEL:low}
      operation-type: ${CHAT_CALCULATOR_OPERATION_TYPE:read}
      timeout-ms: ${CHAT_CALCULATOR_TIMEOUT_MS:5000}
      confirmation:
        default: ${CHAT_CALCULATOR_CONFIRMATION:auto_execute}
      parameter-policy:
        expression: ${CHAT_CALCULATOR_EXPRESSION_POLICY:auto_execute}
    document-search:
      enabled: true
      # Runtime/API retrieval service address. Set this when MCP Server and Runtime are deployed separately.
      api-base-url: ${CHAT_DOCUMENT_SEARCH_API_BASE_URL:${CHAT_RUNTIME_API_BASE_URL:http://localhost:8080}}
      search-path: ${CHAT_DOCUMENT_SEARCH_PATH:/api/v1/search}
      detail-path-template: ${CHAT_DOCUMENT_SEARCH_DETAIL_PATH_TEMPLATE:/api/v1/search/documents/{docId}}
      timeout-ms: ${CHAT_DOCUMENT_SEARCH_TIMEOUT_MS:20000}
      default-limit: ${CHAT_DOCUMENT_SEARCH_DEFAULT_LIMIT:5}
      max-limit: ${CHAT_DOCUMENT_SEARCH_MAX_LIMIT:20}
      auth:
        enabled: ${CHAT_DOCUMENT_SEARCH_AUTH_ENABLED:true}
        login-path: ${CHAT_DOCUMENT_SEARCH_AUTH_LOGIN_PATH:/api/v1/enterprise/auth/login}
        username: ${CHAT_DOCUMENT_SEARCH_AUTH_USERNAME:admin}
        password: ${CHAT_DOCUMENT_SEARCH_AUTH_PASSWORD:123456}
        bearer-token: ${CHAT_DOCUMENT_SEARCH_AUTH_BEARER_TOKEN:}
      risk-level: ${CHAT_DOCUMENT_SEARCH_RISK_LEVEL:medium}
      confirmation:
        default: ${CHAT_DOCUMENT_SEARCH_CONFIRMATION:ask_before_execute}
    web-search:
      enabled: true
      risk-level: ${CHAT_WEB_SEARCH_RISK_LEVEL:low}
      operation-type: ${CHAT_WEB_SEARCH_OPERATION_TYPE:read}
      confirmation:
        default: ${CHAT_WEB_SEARCH_CONFIRMATION:auto_execute}
      parameter-policy:
        query: ${CHAT_WEB_SEARCH_QUERY_POLICY:auto_execute}
      provider: bing_html
      endpoint: https://www.bing.com/search
      user-agent: ChatChat-MCP-Server/1.0
      timeout-ms: 10000
      max-results: 10
      fetch-pages: true
      max-pages-to-fetch: 3
      page-excerpt-chars: 2500
      page-max-bytes: 1048576
      fallback-enabled: true
    database-query:
      enabled: true
      risk-level: ${CHAT_DATABASE_QUERY_RISK_LEVEL:high}
      operation-type: ${CHAT_DATABASE_QUERY_OPERATION_TYPE:read}
      user-visible: ${CHAT_DATABASE_QUERY_USER_VISIBLE:false}
      agent-compatible: ${CHAT_DATABASE_QUERY_AGENT_COMPATIBLE:false}
      confirmation:
        default: ${CHAT_DATABASE_QUERY_CONFIRMATION:ask_before_execute}
      parameter-policy:
        jdbc-url: ${CHAT_DATABASE_QUERY_JDBC_URL_POLICY:ask_before_execute}
        password: ${CHAT_DATABASE_QUERY_PASSWORD_POLICY:ask_before_execute}
      default-max-rows: 50
      max-rows: 500
      query-timeout-seconds: 15
      driver-lib-path: ./lib/drivers
    file-system:
      risk-level: ${CHAT_FILE_SYSTEM_RISK_LEVEL:high}
      operation-type: ${CHAT_FILE_SYSTEM_OPERATION_TYPE:read}
      timeout-ms: ${CHAT_FILE_SYSTEM_TIMEOUT_MS:10000}
      confirmation:
        default: ${CHAT_FILE_SYSTEM_CONFIRMATION:ask_before_execute}
      parameter-policy:
        path: ${CHAT_FILE_SYSTEM_PATH_POLICY:ask_before_execute}

logging:
  file:
    name: ./logs/chatchat-mcp-server.log
  level:
    com.chatchat: INFO
    io.modelcontextprotocol: INFO
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
      total-size-cap: 3GB
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
