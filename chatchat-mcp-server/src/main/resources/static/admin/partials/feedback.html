<div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="appToast" class="toast" role="status" aria-live="polite" aria-atomic="true">
        <div class="toast-header">
            <strong id="toastTitle" class="me-auto">提示</strong>
            <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="关闭"></button>
        </div>
        <div id="toastBody" class="toast-body"></div>
    </div>
</div>

<div class="modal fade" id="resultModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable modal-fullscreen-lg-down">
        <div class="modal-content">
            <div class="modal-header">
                <div>
                    <h2 id="resultTitle" class="modal-title fs-5">执行结果</h2>
                    <div id="resultSubtitle" class="text-secondary small"></div>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
            </div>
            <div class="modal-body">
                <div id="resultSummary" class="result-summary d-none">
                    <span id="resultStatusBadge" class="badge text-bg-secondary">未知</span>
                    <span id="resultHttpStatus" class="text-secondary small"></span>
                    <span id="resultCacheBadge" class="badge text-bg-light d-none">缓存命中</span>
                </div>
                <section class="result-section">
                    <div class="result-section-head">
                        <strong>响应体</strong>
                        <button id="copyResultBtn" class="btn btn-sm btn-outline-secondary" type="button">复制完整结果</button>
                    </div>
                    <pre id="resultBodyOutput" class="result-output result-body-output"></pre>
                </section>
                <details class="result-section result-details">
                    <summary>完整结果 JSON</summary>
                    <pre id="resultOutput" class="result-output"></pre>
                </details>
            </div>
        </div>
    </div>
</div>
