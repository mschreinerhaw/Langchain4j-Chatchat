<main id="loginView" class="login-page">
    <header class="login-header">
        <button class="language-pill" type="button" aria-label="当前语言：简体中文" disabled aria-disabled="true">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="9"></circle>
                <path d="M3 12h18M12 3c2.2 2.5 3.3 5.5 3.3 9s-1.1 6.5-3.3 9M12 3c-2.2 2.5-3.3 5.5-3.3 9s1.1 6.5 3.3 9"></path>
            </svg>
            简体中文
        </button>
    </header>

    <section class="login-layout">
        <section class="login-panel" aria-labelledby="loginPanelTitle">
            <h2 id="loginPanelTitle">登录管理台</h2>
            <p>请输入您的账号信息以继续</p>

            <form id="loginForm" class="login-form">
                <label class="form-label" for="username">用户名</label>
                <div class="login-input-wrap">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M20 21a8 8 0 0 0-16 0"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <input id="username" class="form-control" autocomplete="username" placeholder="请输入用户名" required>
                </div>

                <label class="form-label" for="password">密码</label>
                <div class="login-input-wrap">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <rect x="5" y="10" width="14" height="10" rx="2"></rect>
                        <path d="M8 10V7a4 4 0 0 1 8 0v3"></path>
                    </svg>
                    <input id="password" class="form-control" type="password" autocomplete="current-password" placeholder="请输入密码" required>
                    <button id="togglePasswordBtn" class="password-toggle" type="button" aria-label="显示密码">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>

                <div class="login-options">
                    <label class="remember-me">
                        <input class="form-check-input" type="checkbox">
                        <span>记住我</span>
                    </label>
                    <button class="link-button" type="button">忘记密码?</button>
                </div>

                <button class="btn btn-primary w-100 login-submit" type="submit">登录</button>
                <div id="loginError" class="alert alert-danger d-none" role="alert"></div>
            </form>

            <div class="login-help">
                <div class="help-divider"><span>需要帮助?</span></div>
                <div class="help-links">
                    <button class="link-button" type="button">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M6 3h9l3 3v15H6V3Z"></path>
                            <path d="M14 3v4h4M9 13h6M9 17h4"></path>
                        </svg>
                        查看文档
                    </button>
                    <button class="link-button" type="button">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M4 12a8 8 0 0 1 16 0v5a3 3 0 0 1-3 3h-2"></path>
                            <path d="M6 12h3v6H6a2 2 0 0 1-2-2v-2a2 2 0 0 1 2-2ZM18 12h-3v6h3a2 2 0 0 0 2-2v-2a2 2 0 0 0-2-2Z"></path>
                        </svg>
                        联系我们
                    </button>
                </div>
            </div>
        </section>
    </section>

    <footer class="login-footer">© 2026 ChatChat MCP. 保留所有权利。</footer>
</main>
