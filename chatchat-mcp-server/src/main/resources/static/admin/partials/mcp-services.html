<section id="mcpServicesView" class="panel api-service-view d-none">
    <div class="panel-head api-service-head">
        <div>
            <h2>MCP 注册中心</h2>
            <div class="text-secondary small">共 <span id="mcpServiceTotalCount">0</span> 个服务，匹配 <span id="mcpServiceFilteredCount">0</span> 个，当前显示 <span id="mcpServiceCount">0</span> 个</div>
        </div>
        <div class="api-search">
            <input id="mcpServiceSearchInput" class="form-control" type="search" placeholder="搜索服务名称、地址、类型或权限组">
        </div>
    </div>
    <div id="mcpServiceList" class="api-service-grid"></div>
    <div class="service-pagination">
        <div id="mcpServicePageInfo" class="text-secondary small">第 1 / 1 页</div>
        <div class="btn-group btn-group-sm" role="group" aria-label="MCP 服务分页">
            <button id="mcpServicePrevPageBtn" class="btn btn-outline-secondary" type="button">上一页</button>
            <button id="mcpServiceNextPageBtn" class="btn btn-outline-secondary" type="button">下一页</button>
        </div>
    </div>
</section>

<div class="modal fade" id="mcpServiceModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="mcpFormTitle" class="modal-title fs-5">新增 MCP 服务</h2>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
            </div>
            <div class="modal-body">
                <form id="mcpServiceForm" class="service-form">
                    <input id="mcpServiceId" type="hidden">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label" for="mcpName">服务名称</label>
                            <input id="mcpName" class="form-control" placeholder="Wind 行情服务" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label" for="mcpServiceType">服务类型</label>
                            <input id="mcpServiceType" class="form-control" value="DATA">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label" for="mcpEnabled">启用状态</label>
                            <select id="mcpEnabled" class="form-select">
                                <option value="true">启用</option>
                                <option value="false">停用</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="mcpEndpoint">服务地址</label>
                            <input id="mcpEndpoint" class="form-control" placeholder="http://localhost:8081/mcp" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="mcpPermissionGroup">权限组</label>
                            <input id="mcpPermissionGroup" class="form-control" value="default">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="mcpStatus">运行状态</label>
                            <select id="mcpStatus" class="form-select">
                                <option value="ACTIVE">在线</option>
                                <option value="DISABLED">已停用</option>
                                <option value="OFFLINE">离线</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="mcpServiceToken">服务 Token</label>
                            <div class="input-group">
                                <input id="mcpServiceToken" class="form-control codebox" placeholder="mcp_xxx">
                                <button id="generateMcpTokenBtn" class="btn btn-outline-primary" type="button">生成 Token</button>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="form-text">服务接入或启用 MCP 调用认证时，请在请求头中使用 <code>X-MCP-TOKEN</code> 携带该 Token。</div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button id="resetMcpFormBtn" class="btn btn-outline-secondary" type="button">清空</button>
                <button id="regenSavedMcpTokenBtn" class="btn btn-outline-primary" type="button">重新生成已保存 Token</button>
                <button class="btn btn-primary" type="submit" form="mcpServiceForm">保存 MCP 服务</button>
            </div>
        </div>
    </div>
</div>
