server:
  port: 8091
  shutdown: graceful

spring:
  application:
    name: chatchat-runtime-news
  profiles:
    default: h2
  lifecycle:
    timeout-per-shutdown-phase: 30s
  jpa:
    open-in-view: false

logging:
  file:
    name: ./logs/chatchat-runtime-news.log
  level:
    root: INFO
    com.chatchat.runtime.news: INFO

chatchat:
  # MCP 与 News Runtime 必须配置完全相同的内部账户。
  # 下方明文仅用于首次启动，并与 MCP 发布包的默认值一致。
  # 正式生产环境请尽快改成 ENC(...) 密文和外部密钥文件，并在 MCP 端同步修改。
  internal-credential:
    enabled: true
    username: chatchat_mcp_internal
    encrypted-secret: ""
    secret: chatchat_internal_default_secret
    crypto-key: ""
    crypto-key-file: ""
  runtime:
    news:
      enabled: true
      collector-core-size: 2
      collector-max-size: 4
      collector-queue-capacity: 20
      max-items-per-run: 500
      bulk:
        queue-capacity: 5000
        batch-size: 300
        flush-interval-millis: 2000
        offer-timeout-millis: 3000
        max-retries: 2
      attachment:
        enabled: true
        worker-count: 2
        queue-capacity: 500
        max-file-bytes: 26214400
        max-attachments-per-article: 20
        max-extracted-chars: 2000000
        chunk-size: 1200
        chunk-overlap: 150
        max-chunks-per-attachment: 500
      open-search:
        enabled: true
        endpoint: http://127.0.0.1:9200
        username: ""
        password: ""
        insecure-ssl: false
        index-name: runtime-news
        retention-days: 7
        zone-id: Asia/Shanghai
        retention-cron: "0 15 0 * * *"
        embedding:
          enabled: false
          endpoint: ""
          api-key: ""
          model: text-embedding-v4
          dimension: 1024
          vector-field: embedding
          max-input-chars: 8000
          batch-size: 16
          request-timeout-millis: 120000
          vector-candidate-limit: 100
