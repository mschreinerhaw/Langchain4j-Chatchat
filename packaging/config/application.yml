spring:
  application:
    name: chatchat
    version: 1.0.0-SNAPSHOT
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  datasource:
    url: jdbc:h2:file:./data/h2/chatchat;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: true
      transaction-isolation: TRANSACTION_READ_COMMITTED
  h2:
    console:
      enabled: false
      path: /h2-console
      settings:
        web-allow-others: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        format_sql: false
  web:
    resources:
      static-locations: classpath:/static/
  mvc:
    static-path-pattern: /**
    throw-exception-if-no-handler-found: true
  resources:
    add-mappings: false

server:
  port: 8080
  servlet:
    context-path: /
  shutdown: graceful
  tomcat:
    threads:
      max: 200
      min-spare: 10
    max-connections: 500
    max-http-post-size: 10485760
  error:
    include-stacktrace: never
    include-message: never

chatchat:
  mcp:
    center:
      enabled: true
      base-url: http://localhost:8090
      admin-username: admin
      admin-password: admin123
      admin-login-path: /api/v1/admin/auth/login
      service-list-path: /api/v1/mcp-services
      mcp-endpoint: /mcp
      standalone-service-id: chatchat-mcp-server
      standalone-service-name: ChatChat MCP Server
      invocation-token:
      timeout-ms: 20000
      import-standalone-server: true
    stdio-proxy:
      enabled: true
      max-sessions: 32
      request-timeout-ms: 20000
      startup-timeout-ms: 15000
      idle-ttl-ms: 300000
      cleanup-interval-ms: 30000
      command-allow-list:
        - npx
        - node
        - uvx
        - python
        - python3
  models:
    defaultProvider: openai
    defaultChatModel: qwen3.6-plus
    defaultEmbeddingModel: text-embedding-v4
    timeout: 300
    openai:
      apiKey: replace-with-your-key
      baseUrl: https://dashscope.aliyuncs.com/compatible-mode/v1
      timeout: 300
      maxRetries: 3
      proxy:
        enabled: false
        host:
        port: 0
        type: http
    ollama:
      baseUrl: http://localhost:11434
      timeout: 30
    xinference:
      baseUrl: http://localhost:9997
      timeout: 30
  rag:
    maxRetrievalResults: 10
    defaultChunkSize: 1000
    defaultChunkOverlap: 100
    timeout: 60
  agent:
    task:
      queue-capacity: 1000
      core-pool-size: 4
      max-pool-size: 16
      keep-alive-seconds: 60
      list-limit: 50
      event-store:
        type: rocksdb
        path: ./data/agent-event-rocksdb
        create-if-missing: true
  search:
    store-path: ./data/search-rocksdb
    file-path: ./data/search-files
    create-if-missing: true
    embedding-enabled: true
    max-upload-bytes: 5242880
    default-limit: 20
    max-limit: 100
    summary-length: 180
  chat:
    defaultTimeout: 30
    streamingTimeout: 300
    maxMessageLength: 4096
    conversationHistorySize: 20
    detail-store:
      type: rocksdb
      path: ./data/chat-rocksdb
      create-if-missing: true
  tools:
    database-query:
      driver-lib-path: ./lib/drivers

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    display-request-duration: true
    try-it-out-enabled: true
  show-actuator: false
  use-fqn: false

logging:
  file:
    name: ./logs/chatchat.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
      total-size-cap: 3GB
  level:
    com.chatchat: INFO
    org.springframework.web: INFO
    org.springframework.security: WARN
    org.hibernate: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
