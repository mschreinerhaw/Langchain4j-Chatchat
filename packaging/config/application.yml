spring:
  application:
    name: chatchat
    version: ${CHAT_APP_VERSION:1.0.0-SNAPSHOT}
  servlet:
    multipart:
      max-file-size: ${CHAT_MULTIPART_MAX_FILE_SIZE:5MB}
      max-request-size: ${CHAT_MULTIPART_MAX_REQUEST_SIZE:5MB}
  datasource:
    url: ${CHAT_DATASOURCE_URL:jdbc:h2:file:./data/h2/chatchat;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1}
    driver-class-name: ${CHAT_DATASOURCE_DRIVER:org.h2.Driver}
    username: ${CHAT_DATASOURCE_USERNAME:sa}
    password: ${CHAT_DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: ${CHAT_DATASOURCE_POOL_MAX:10}
      minimum-idle: ${CHAT_DATASOURCE_POOL_MIN:2}
      connection-timeout: ${CHAT_DATASOURCE_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${CHAT_DATASOURCE_IDLE_TIMEOUT:600000}
      max-lifetime: ${CHAT_DATASOURCE_MAX_LIFETIME:1800000}
      auto-commit: ${CHAT_HIKARI_AUTO_COMMIT:true}
      transaction-isolation: ${CHAT_HIKARI_TRANSACTION_ISOLATION:TRANSACTION_READ_COMMITTED}
  h2:
    console:
      enabled: ${CHAT_H2_CONSOLE_ENABLED:false}
      path: ${CHAT_H2_CONSOLE_PATH:/h2-console}
      settings:
        web-allow-others: ${CHAT_H2_CONSOLE_WEB_ALLOW_OTHERS:false}
  jpa:
    hibernate:
      ddl-auto: ${CHAT_JPA_DDL_AUTO:update}
    show-sql: ${CHAT_JPA_SHOW_SQL:false}
    database-platform: ${CHAT_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
    properties:
      hibernate:
        format_sql: ${CHAT_HIBERNATE_FORMAT_SQL:false}
  web:
    resources:
      static-locations: classpath:/static/
  mvc:
    static-path-pattern: /**
    throw-exception-if-no-handler-found: true
  resources:
    add-mappings: false

server:
  port: ${CHAT_SERVER_PORT:8080}
  servlet:
    context-path: ${CHAT_SERVER_CONTEXT_PATH:/}
  shutdown: graceful
  tomcat:
    threads:
      max: ${CHAT_TOMCAT_THREADS_MAX:200}
      min-spare: ${CHAT_TOMCAT_THREADS_MIN_SPARE:10}
    max-connections: ${CHAT_TOMCAT_MAX_CONNECTIONS:500}
    max-http-post-size: ${CHAT_TOMCAT_MAX_HTTP_POST_SIZE:10485760}
  error:
    include-stacktrace: ${CHAT_ERROR_INCLUDE_STACKTRACE:never}
    include-message: ${CHAT_ERROR_INCLUDE_MESSAGE:never}

chatchat:
  mcp:
    center:
      enabled: ${CHAT_MCP_CENTER_ENABLED:true}
      base-url: ${CHAT_MCP_CENTER_BASE_URL:http://localhost:8090}
      admin-username: ${CHAT_MCP_CENTER_ADMIN_USERNAME:admin}
      admin-password: ${CHAT_MCP_CENTER_ADMIN_PASSWORD:admin123}
      admin-login-path: ${CHAT_MCP_CENTER_ADMIN_LOGIN_PATH:/api/v1/admin/auth/login}
      service-list-path: ${CHAT_MCP_CENTER_SERVICE_LIST_PATH:/api/v1/mcp-services}
      mcp-endpoint: ${CHAT_MCP_CENTER_MCP_ENDPOINT:/mcp}
      standalone-service-id: ${CHAT_MCP_CENTER_STANDALONE_SERVICE_ID:chatchat-mcp-server}
      standalone-service-name: ${CHAT_MCP_CENTER_STANDALONE_SERVICE_NAME:ChatChat MCP Server}
      invocation-token: ${CHAT_MCP_CENTER_INVOCATION_TOKEN:}
      timeout-ms: ${CHAT_MCP_CENTER_TIMEOUT_MS:20000}
      import-standalone-server: ${CHAT_MCP_CENTER_IMPORT_STANDALONE:true}
    stdio-proxy:
      enabled: ${CHAT_MCP_STDIO_PROXY_ENABLED:true}
      max-sessions: ${CHAT_MCP_STDIO_PROXY_MAX_SESSIONS:32}
      request-timeout-ms: ${CHAT_MCP_STDIO_PROXY_REQUEST_TIMEOUT_MS:20000}
      startup-timeout-ms: ${CHAT_MCP_STDIO_PROXY_STARTUP_TIMEOUT_MS:15000}
      idle-ttl-ms: ${CHAT_MCP_STDIO_PROXY_IDLE_TTL_MS:300000}
      cleanup-interval-ms: ${CHAT_MCP_STDIO_PROXY_CLEANUP_INTERVAL_MS:30000}
      command-allow-list:
        - npx
        - node
        - uvx
        - python
        - python3
  models:
    defaultProvider: ${CHAT_MODELS_DEFAULT_PROVIDER:openai}
    defaultChatModel: ${CHAT_MODELS_DEFAULT_CHAT_MODEL:qwen3.6-plus}
    defaultEmbeddingModel: ${CHAT_MODELS_DEFAULT_EMBEDDING_MODEL:text-embedding-v4}
    timeout: ${CHAT_MODELS_TIMEOUT:300}
    openai:
      apiKey: ${OPENAI_API_KEY:replace-with-your-key}
      baseUrl: ${OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      timeout: ${OPENAI_TIMEOUT:300}
      maxRetries: ${OPENAI_MAX_RETRIES:3}
      proxy:
        enabled: ${OPENAI_PROXY_ENABLED:false}
        host: ${OPENAI_PROXY_HOST:}
        port: ${OPENAI_PROXY_PORT:0}
        type: ${OPENAI_PROXY_TYPE:http}
    ollama:
      baseUrl: ${OLLAMA_BASE_URL:http://localhost:11434}
      timeout: ${OLLAMA_TIMEOUT:30}
    xinference:
      baseUrl: ${XINFERENCE_BASE_URL:http://localhost:9997}
      timeout: ${XINFERENCE_TIMEOUT:30}
  rag:
    maxRetrievalResults: ${CHAT_RAG_MAX_RETRIEVAL_RESULTS:10}
    defaultChunkSize: ${CHAT_RAG_DEFAULT_CHUNK_SIZE:1000}
    defaultChunkOverlap: ${CHAT_RAG_DEFAULT_CHUNK_OVERLAP:100}
    timeout: ${CHAT_RAG_TIMEOUT:60}
  agent:
    task:
      queue-capacity: ${CHAT_AGENT_TASK_QUEUE_CAPACITY:1000}
      core-pool-size: ${CHAT_AGENT_TASK_CORE_POOL_SIZE:4}
      max-pool-size: ${CHAT_AGENT_TASK_MAX_POOL_SIZE:16}
      keep-alive-seconds: ${CHAT_AGENT_TASK_KEEP_ALIVE_SECONDS:60}
      list-limit: ${CHAT_AGENT_TASK_LIST_LIMIT:50}
      event-store:
        type: ${CHAT_AGENT_EVENT_STORE_TYPE:rocksdb}
        path: ${CHAT_AGENT_EVENT_STORE_PATH:./data/agent-event-rocksdb}
        create-if-missing: ${CHAT_AGENT_EVENT_STORE_CREATE_IF_MISSING:true}
  search:
    store-path: ${CHAT_SEARCH_STORE_PATH:./data/search-rocksdb}
    file-path: ${CHAT_SEARCH_FILE_PATH:./data/search-files}
    create-if-missing: ${CHAT_SEARCH_CREATE_IF_MISSING:true}
    embedding-enabled: ${CHAT_SEARCH_EMBEDDING_ENABLED:true}
    max-upload-bytes: ${CHAT_SEARCH_MAX_UPLOAD_BYTES:5242880}
    default-limit: ${CHAT_SEARCH_DEFAULT_LIMIT:20}
    max-limit: ${CHAT_SEARCH_MAX_LIMIT:100}
    summary-length: ${CHAT_SEARCH_SUMMARY_LENGTH:180}
  chat:
    defaultTimeout: ${CHAT_CHAT_DEFAULT_TIMEOUT:30}
    streamingTimeout: ${CHAT_CHAT_STREAMING_TIMEOUT:300}
    maxMessageLength: ${CHAT_CHAT_MAX_MESSAGE_LENGTH:4096}
    conversationHistorySize: ${CHAT_CHAT_CONVERSATION_HISTORY_SIZE:20}
    detail-store:
      type: ${CHAT_DETAIL_STORE_TYPE:rocksdb}
      path: ${CHAT_DETAIL_STORE_PATH:./data/chat-rocksdb}
      create-if-missing: ${CHAT_DETAIL_STORE_CREATE_IF_MISSING:true}
  tools:
    database-query:
      driver-lib-path: ${CHAT_TOOLS_DATABASE_QUERY_DRIVER_LIB_PATH:./lib/drivers}

springdoc:
  api-docs:
    path: ${CHAT_SPRINGDOC_API_DOCS_PATH:/api-docs}
    enabled: ${CHAT_SPRINGDOC_API_DOCS_ENABLED:true}
  swagger-ui:
    path: ${CHAT_SPRINGDOC_SWAGGER_UI_PATH:/swagger-ui.html}
    enabled: ${CHAT_SPRINGDOC_SWAGGER_UI_ENABLED:true}
    display-request-duration: true
    try-it-out-enabled: true
  show-actuator: false
  use-fqn: false

logging:
  file:
    name: ${CHAT_LOG_FILE:./logs/chatchat.log}
  logback:
    rollingpolicy:
      max-file-size: ${CHAT_LOG_MAX_FILE_SIZE:100MB}
      max-history: ${CHAT_LOG_MAX_HISTORY:30}
      total-size-cap: ${CHAT_LOG_TOTAL_SIZE_CAP:3GB}
  level:
    com.chatchat: ${CHAT_LOG_LEVEL_CHATCHAT:INFO}
    org.springframework.web: ${CHAT_LOG_LEVEL_SPRING_WEB:INFO}
    org.springframework.security: ${CHAT_LOG_LEVEL_SPRING_SECURITY:WARN}
    org.hibernate: ${CHAT_LOG_LEVEL_HIBERNATE:WARN}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: ${CHAT_MANAGEMENT_ENDPOINTS:health,metrics,info}
  endpoint:
    health:
      show-details: ${CHAT_MANAGEMENT_HEALTH_SHOW_DETAILS:when-authorized}
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
