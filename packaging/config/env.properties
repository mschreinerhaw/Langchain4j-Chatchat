# Production environment template for bin/start.sh and bin/start.bat.
# Put machine-specific secrets in config/env.local; it is intentionally ignored by git.
SPRING_PROFILES_ACTIVE=prod

# Model provider
OPENAI_API_KEY=
OPENAI_PROXY_ENABLED=false
OPENAI_PROXY_HOST=
OPENAI_PROXY_PORT=0
OPENAI_PROXY_TYPE=http

# Runtime database uses H2 by default.
# Start with --database=mysql to add application-mysql.yml.
# Set CHATCHAT_DATASOURCE_MIGRATION_ENABLED=true once to copy H2 data into an empty MySQL schema.
CHATCHAT_DATASOURCE_MIGRATION_ENABLED=false

# Standalone MCP center
CHAT_MCP_CENTER_ENABLED=true
CHAT_MCP_CENTER_BASE_URL=http://localhost:8090
CHAT_MCP_CENTER_ADMIN_USERNAME=
CHAT_MCP_CENTER_ADMIN_PASSWORD=
CHAT_MCP_INVOCATION_TOKEN=

# Document search auth
CHAT_DOCUMENT_SEARCH_AUTH_USERNAME=
CHAT_DOCUMENT_SEARCH_AUTH_PASSWORD=
CHAT_DOCUMENT_SEARCH_AUTH_BEARER_TOKEN=

# Storage paths
CHAT_AGENT_RUNTIME_ROCKSDB_PATH=./data/agent-runtime-rocksdb
CHAT_AGENT_EVENT_STORE_PATH=./data/agent-event-rocksdb
CHAT_SEARCH_STORE_PATH=./data/search-rocksdb
CHAT_SEARCH_FILE_PATH=./data/search-files
CHAT_DETAIL_STORE_PATH=./data/chat-rocksdb
